<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 – Match Center</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#080d1c;color:#e2e8f0;min-height:100vh}
.bg-glow{position:fixed;inset:0;background:radial-gradient(ellipse at 15% 20%,rgba(30,60,130,.3) 0%,transparent 55%),radial-gradient(ellipse at 85% 75%,rgba(120,20,60,.22) 0%,transparent 55%);pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1}
.page-header{text-align:center;padding:3rem 1rem 2rem}
.live-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:6px 18px;font-size:13px;color:#94a3b8;margin-bottom:16px}
.live-dot{width:8px;height:8px;border-radius:50%;background:#ef4444;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(1.45)}}
.page-header h1{font-size:2.1rem;font-weight:700;color:#fff;letter-spacing:-.5px;margin:0}
.date-text{font-size:14px;color:#475569;margin-top:6px}
.filters{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:2rem;padding:0 1rem}
.filter-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:999px;color:#94a3b8;font-size:13px;padding:6px 18px;cursor:pointer;transition:all .2s}
.filter-btn.active,.filter-btn:hover{background:rgba(99,102,241,.25);border-color:rgba(99,102,241,.5);color:#a5b4fc}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;max-width:700px;margin:0 auto 2rem;padding:0 1rem}
.stat-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:1rem;text-align:center}
.stat-num{font-size:24px;font-weight:700;color:#fff}
.stat-label{font-size:12px;color:#475569;margin-top:4px}
.match-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:1.4rem 1.5rem;margin-bottom:14px;transition:transform .3s ease,box-shadow .3s ease,border-color .3s ease;animation:slideUp .45s ease both}
.match-card:hover{transform:translateY(-4px);border-color:rgba(255,255,255,.18);box-shadow:0 14px 40px rgba(0,0,0,.45)}
@keyframes slideUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
.match-card.live-card{border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.05)}
.match-card.finished-card{border-color:rgba(34,197,94,.2);background:rgba(34,197,94,.04)}
.match-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.1rem;gap:8px}
.tournament-info{display:flex;align-items:center;gap:6px;font-size:12px;color:#64748b;min-width:0}
.tournament-info i{font-size:14px;color:#94a3b8;flex-shrink:0}
.tournament-info span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.status-pill{font-size:11px;font-weight:600;padding:4px 12px;border-radius:999px;white-space:nowrap;flex-shrink:0}
.s-live{background:rgba(239,68,68,.18);color:#f87171;animation:blink 1.4s infinite}
.s-upcoming{background:rgba(148,163,184,.1);color:#94a3b8}
.s-finished{background:rgba(34,197,94,.14);color:#4ade80}
.match-body{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:1rem}
.team{display:flex;flex-direction:column;align-items:center;gap:9px}
.team-flag{font-size:40px;line-height:1;filter:drop-shadow(0 2px 6px rgba(0,0,0,.4));transition:transform .3s ease}
.match-card:hover .team-flag{transform:scale(1.1)}
.team-name{font-size:14px;font-weight:600;color:#e2e8f0;text-align:center;line-height:1.3}
.team-code{font-size:11px;color:#fff;letter-spacing:1px}
.score-center{display:flex;flex-direction:column;align-items:center;gap:7px}
.score-row{display:flex;align-items:center;gap:10px}
.score-num{font-size:36px;font-weight:700;color:#fff;min-width:34px;text-align:center;animation:pop .35s cubic-bezier(.36,1.56,.64,1) both}
@keyframes pop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
.score-sep{font-size:22px;color:#1e293b;font-weight:300}
.vs-text{font-size:16px;color:#334155;font-weight:500}
.time-text{font-size:12px;color:#64748b}
.live-time{font-size:12px;color:#f87171;font-weight:600}
.match-footer{display:flex;align-items:center;gap:6px;font-size:12px;color:#334155;margin-top:1rem;padding-top:.9rem;border-top:1px solid rgba(255,255,255,.06)}
.match-footer i{font-size:14px;color:#475569}
.empty-state{text-align:center;padding:5rem 1rem}
.empty-icon{font-size:60px;color:#1e293b;margin-bottom:1.2rem}
.empty-state h2{font-size:1.3rem;font-weight:600;color:#334155;margin-bottom:8px}
.empty-state p{font-size:14px;color:#1e293b}
.loader{text-align:center;padding:4rem}
.spinner{width:32px;height:32px;border:2px solid rgba(255,255,255,.08);border-top-color:#6366f1;border-radius:50%;animation:spin .75s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loader p{font-size:14px;color:#475569}
.error-box{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:12px;padding:1.2rem;margin:1rem 0;font-size:14px;color:#f87171;display:flex;align-items:center;gap:10px}
.match-date-badge{font-size:11px;background:rgba(99,102,241,.15);color:#818cf8;border-radius:6px;padding:2px 8px;font-weight:500;margin-left:4px}
.footer-note{text-align:center;font-size:12px;color:#1e293b;padding:1.5rem 0 2.5rem}

.fifa-scoreboard{
    display:flex;
    align-items:center;
    justify-content:center;
    width:fit-content;
    margin:auto;
    background:#101827;
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 6px 20px rgba(0,0,0,.35);
}

.match-time{
    background:#f3f4f6;
    color:#111827;
    font-weight:800;
    font-size:14px;
    padding:8px 12px;
    min-width:70px;
    text-align:center;
}

.team-side{
    display:flex;
    align-items:center;
    gap:6px;
    background:#1e293b;
    color:#fff;
    padding:8px 12px;
    font-weight:700;
}

.flag{
    font-size:18px;
}

.team-code{
    font-size:14px;
    font-weight:700;
    letter-spacing:.5px;
}

.score-box{
    min-width:42px;
    text-align:center;
    background:#22c55e;
    color:#fff;
    font-size:22px;
    font-weight:900;
    padding:5px 0;
    border-radius: 5px;
}

.worldcup-icon{
    background:#111827;
    padding:7px 0px;
    border-radius: 5px;
}

.match-body{
    display:block !important;
}

.team{
    display:none !important;
}

.match-card{
    padding:20px;
}

.fifa {
  width: 40px;
  height: 40px;
}

</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="wrap">
  <div class="page-header">
    <div class="live-badge"><span class="live-dot"></span>FIFA World Cup 2026</div>
    <h1>Match Center</h1>
    <p class="date-text" id="date-label"></p>
  </div>
  <div class="container" style="max-width:720px">
    <div class="stats-row" id="stats-row" style="display:none">
      <div class="stat-card"><div class="stat-num" id="s-total">0</div><div class="stat-label">Total Matches</div></div>
      <div class="stat-card"><div class="stat-num" id="s-live" style="color:#f87171">0</div><div class="stat-label">Live Now</div></div>
      <div class="stat-card"><div class="stat-num" id="s-today">0</div><div class="stat-label">Today</div></div>
      <div class="stat-card"><div class="stat-num" id="s-finished" style="color:#4ade80">0</div><div class="stat-label">Finished</div></div>
    </div>
    <div class="filters" id="filters" style="display:none">
      <button class="filter-btn active" data-filter="all">All Matches</button>
      <button class="filter-btn" data-filter="live">Live</button>
      <button class="filter-btn" data-filter="today">Today</button>
      <button class="filter-btn" data-filter="upcoming">Upcoming</button>
      <button class="filter-btn" data-filter="finished">Finished</button>
    </div>
    <div id="main-content"><div class="loader"><div class="spinner"></div><p>Fetching World Cup matches…</p></div></div>
  </div>
</div>
<script>
const FLAGS={
  "United States":"🇺🇸","USA":"🇺🇸","Mexico":"🇲🇽","MEX":"🇲🇽","Canada":"🇨🇦","CAN":"🇨🇦",
  "Brazil":"🇧🇷","BRA":"🇧🇷","Argentina":"🇦🇷","ARG":"🇦🇷","Uruguay":"🇺🇾","URU":"🇺🇾",
  "Colombia":"🇨🇴","COL":"🇨🇴","Ecuador":"🇪🇨","ECU":"🇪🇨","Chile":"🇨🇱","CHI":"🇨🇱",
  "Paraguay":"🇵🇾","PAR":"🇵🇾","Bolivia":"🇧🇴","BOL":"🇧🇴","Venezuela":"🇻🇪","VEN":"🇻🇪","Peru":"🇵🇪","PER":"🇵🇪",
  "France":"🇫🇷","FRA":"🇫🇷","Germany":"🇩🇪","GER":"🇩🇪","Spain":"🇪🇸","ESP":"🇪🇸",
  "England":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","ENG":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Italy":"🇮🇹","ITA":"🇮🇹","Portugal":"🇵🇹","POR":"🇵🇹",
  "Netherlands":"🇳🇱","NED":"🇳🇱","Belgium":"🇧🇪","BEL":"🇧🇪","Croatia":"🇭🇷","CRO":"🇭🇷",
  "Serbia":"🇷🇸","SRB":"🇷🇸","Denmark":"🇩🇰","DEN":"🇩🇰","Switzerland":"🇨🇭","SUI":"🇨🇭",
  "Austria":"🇦🇹","AUT":"🇦🇹","Poland":"🇵🇱","POL":"🇵🇱","Hungary":"🇭🇺","HUN":"🇭🇺",
  "Romania":"🇷🇴","ROU":"🇷🇴","Czech Republic":"🇨🇿","CZE":"🇨🇿","Slovakia":"🇸🇰","SVK":"🇸🇰",
  "Wales":"🏴󠁧󠁢󠁷󠁬󠁳󠁿","WAL":"🏴󠁧󠁢󠁷󠁬󠁳󠁿","Scotland":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","SCO":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","Ireland":"🇮🇪","IRL":"🇮🇪",
  "Morocco":"🇲🇦","MAR":"🇲🇦","Senegal":"🇸🇳","SEN":"🇸🇳","Nigeria":"🇳🇬","NGA":"🇳🇬",
  "Ghana":"🇬🇭","GHA":"🇬🇭","Cameroon":"🇨🇲","CMR":"🇨🇲","Egypt":"🇪🇬","EGY":"🇪🇬",
  "Tunisia":"🇹🇳","TUN":"🇹🇳","Algeria":"🇩🇿","ALG":"🇩🇿","Ivory Coast":"🇨🇮","CIV":"🇨🇮",
  "South Africa":"🇿🇦","RSA":"🇿🇦","Mali":"🇲🇱","MLI":"🇲🇱",
  "Japan":"🇯🇵","JPN":"🇯🇵","South Korea":"🇰🇷","KOR":"🇰🇷","Australia":"🇦🇺","AUS":"🇦🇺",
  "Saudi Arabia":"🇸🇦","KSA":"🇸🇦","Iran":"🇮🇷","IRN":"🇮🇷","Qatar":"🇶🇦","QAT":"🇶🇦",
  "China":"🇨🇳","CHN":"🇨🇳","Iraq":"🇮🇶","IRQ":"🇮🇶","UAE":"🇦🇪",
  "New Zealand":"🇳🇿","NZL":"🇳🇿","Indonesia":"🇮🇩","IDN":"🇮🇩",
  "Turkey":"🇹🇷","TUR":"🇹🇷","Greece":"🇬🇷","GRE":"🇬🇷","Sweden":"🇸🇪","SWE":"🇸🇪",
  "Norway":"🇳🇴","NOR":"🇳🇴","Finland":"🇫🇮","FIN":"🇫🇮","Iceland":"🇮🇸","ISL":"🇮🇸",
  "Panama":"🇵🇦","PAN":"🇵🇦","Costa Rica":"🇨🇷","CRC":"🇨🇷","Honduras":"🇭🇳","HON":"🇭🇳",
  "Jamaica":"🇯🇲","JAM":"🇯🇲","TBD":"🏳️"
};

function flag(name){return FLAGS[name]||FLAGS[(name||"").toUpperCase()]||"🏳️"}
function todayStr(){return new Date().toISOString().slice(0,10)}

function parseStatus(g){
  if(String(g.finished).toUpperCase()==="TRUE") return "finished";

  const s=String(
    g.time_elapsed||
    g.status||
    g.state||
    ""
  ).toLowerCase();

  if(
    s.includes("live")||
    s.includes("progress")||
    s.includes("play")
  ) return "live";

  if(
    s.includes("finish")||
    s.includes("completed")||
    s.includes("end")
  ) return "finished";

  return "upcoming";
}

function parseDate(g){
  return (
    g.local_date ||
    g.date ||
    g.match_date ||
    g.datetime ||
    ""
  );
}

function parseTime(g){
  const r=
    g.local_date||
    g.time||
    g.match_time||
    g.kick_off||
    g.datetime||
    "";

  const m=String(r).match(/\d{1,2}:\d{2}/);

  return m?m[0]:"";
}

function teamName(g,side){
  if(side==="home"){
    return (
      g.home_team_name_en ||
      g.home_team ||
      g.team1 ||
      g.team_home ||
      g.home ||
      "TBD"
    );
  }

  return (
    g.away_team_name_en ||
    g.away_team ||
    g.team2 ||
    g.team_away ||
    g.away ||
    "TBD"
  );
}

function scoreBlock(g,status){
  const home=teamName(g,"home");
  const away=teamName(g,"away");

  const hs=g.home_score ?? 0;
  const as=g.away_score ?? 0;

  let time=parseTime(g);

  if(status==="finished") time="FT";
  if(status==="live") time=g.time_elapsed || "LIVE";

  return `
  <div class="fifa-scoreboard">
      <div class="match-time">${time}</div>

      <div class="team-side">
          <span class="flag">${flag(home)}</span>
          <span class="team-code">${teamCode(home)}</span>
      </div>

      <div class="score-box">${hs}</div>

      <div class="worldcup-icon"><img src="fifa26.png" class="fifa"></div>

      <div class="score-box">${as}</div>

      <div class="team-side">
          <span class="team-code">${teamCode(away)}</span>
          <span class="flag">${flag(away)}</span>
      </div>
  </div>`;
}

function teamCode(name){
  return (name || "TBD")
    .replace(/[^A-Za-z]/g, "")
    .slice(0,3)
    .toUpperCase();
}

function cardHTML(g,idx,stadiumName){
  const status=parseStatus(g);
  const home=teamName(g,"home");
  const away=teamName(g,"away");
  const tournament=
  g.group
  ? `Group ${g.group}`
  : g.stage || g.round || g.tournament || g.phase || "World Cup 2026";
  const venue=stadiumName||g.venue||g.stadium_name||"";
  const matchDate=parseDate(g);
  const dateLabel=matchDate?new Date(matchDate).toLocaleDateString("en-US",{month:"short",day:"numeric"}):"";
  const delay=Math.min(idx*0.08+0.04,1.2);
  const cardCls=status==="live"?"live-card":status==="finished"?"finished-card":"";
  const sCls=status==="live"?"s-live":status==="finished"?"s-finished":"s-upcoming";
  const sLabel=status==="live"?"● LIVE":status==="finished"?"✓ Full Time":"Upcoming";
  return`<div class="match-card ${cardCls}" style="animation-delay:${delay}s">
<div class="match-top">
  <div class="tournament-info"><i class="ti ti-trophy" aria-hidden="true"></i><span>${tournament}</span>${dateLabel?`<span class="match-date-badge">${dateLabel}</span>`:""}</div>
  <span class="status-pill ${sCls}">${sLabel}</span>
</div>
<div class="match-body">
  <div class="team"><div class="team-flag">${flag(home)}</div><div class="team-name">${home}</div><div class="team-code">${teamCode(home)}</div></div>
  <div style="margin:10px 0">
    ${scoreBlock(g,status)}
</div>
  <div class="team"><div class="team-flag">${flag(away)}</div><div class="team-name">${away}</div><div class="team-code">${teamCode(away)}</div></div>
</div>
${venue?`<div class="match-footer"><i class="ti ti-map-pin" aria-hidden="true"></i>${venue}</div>`:""}
</div>`;
}

let allGames=[];
let stadiumCache={};
let currentFilter="all";

function todayStr(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function isToday(g){
  const date = g.local_date || g.date || g.match_date || "";

  if(!date) return false;

  const m = String(date).match(/^(\d{2})\/(\d{2})\/(\d{4})/);

  if(!m) return false;

  const gameDate = `${m[3]}-${m[1]}-${m[2]}`;

  return gameDate === todayStr();
}

function filterGames(games,f){
  if(f==="all")return games;
  if(f==="live")return games.filter(g=>parseStatus(g)==="live");
  if(f==="today")return games.filter(g=>isToday(g));
  if(f==="upcoming")return games.filter(g=>parseStatus(g)==="upcoming");
  if(f==="finished")return games.filter(g=>parseStatus(g)==="finished");
  return games;
}

function updateStats(games){
  document.getElementById("s-total").textContent=games.length;
  document.getElementById("s-live").textContent=games.filter(g=>parseStatus(g)==="live").length;
  document.getElementById("s-today").textContent=games.filter(g=>isToday(g)).length;
  document.getElementById("s-finished").textContent=games.filter(g=>parseStatus(g)==="finished").length;
  document.getElementById("stats-row").style.display="";
}

async function fetchStadium(id){
  if(!id)return"";
  if(stadiumCache[id]!==undefined)return stadiumCache[id];
  try{
    const r=await fetch(`https://worldcup26.ir/get/stadium/${id}`);
    const d=await r.json();
    const name=d.name||d.stadium_name||d.title||"";
    stadiumCache[id]=name;
    return name;
  }catch(e){stadiumCache[id]="";return""}
}

async function loadStadiums(games){
  const ids=[...new Set(games.map(g=>g.stadium_id||g.venue_id).filter(Boolean))];
  await Promise.all(ids.map(id=>fetchStadium(id)));
}

function renderGames(games){
  const filtered=filterGames(games,currentFilter);
  const el=document.getElementById("main-content");
  if(!filtered.length){
    el.innerHTML=`<div class="empty-state"><div class="empty-icon"><i class="ti ti-ball-football"></i></div><h2>No matches found</h2><p>Try a different filter or check back soon.</p></div>`;
    return;
  }
  el.innerHTML=filtered.map((g,i)=>{
    const sid=g.stadium_id||g.venue_id||null;
    const sName=sid&&stadiumCache[sid]?stadiumCache[sid]:"";
    return cardHTML(g,i,sName);
  }).join("");
}

async function init(){
  document.getElementById("date-label").textContent=new Date().toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
  try{
    const r=await fetch("https://worldcup26.ir/get/games");
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const raw=await r.json();
    allGames=Array.isArray(raw)
  ? raw
  : raw.games || raw.data || raw.matches || raw.results || [];
    if(!allGames.length)throw new Error("No match data returned");
    updateStats(allGames);
    document.getElementById("filters").style.display="";
    await loadStadiums(allGames);
    renderGames(allGames);
    setInterval(async()=>{
      try{
        const r2=await fetch("https://worldcup26.ir/get/games");
        const raw2=await r2.json();
        const games2=Array.isArray(raw2)?raw2:raw2.games||raw2.data||raw2.matches||[];
        if(games2.length){allGames=games2;updateStats(allGames);renderGames(allGames);}
      }catch(e){}
    },30000);
  }catch(e){
    document.getElementById("main-content").innerHTML=`<div class="error-box"><i class="ti ti-alert-triangle"></i>Could not load matches: ${e.message}</div>`;
  }
}

document.addEventListener("click",e=>{
  const btn=e.target.closest(".filter-btn");
  if(!btn)return;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  currentFilter=btn.dataset.filter;
  renderGames(allGames);
});

init();

setInterval(()=>{
  document.querySelectorAll(".match-card").forEach((c,i)=>{
    setTimeout(()=>{
      c.style.transition="transform .25s ease";
      c.style.transform="scale(1.012)";
      setTimeout(()=>{c.style.transform="";},260);
    },i*70);
  });
},12000);
</script>
</body>
</html>
